basePath: /api/v1
definitions:
  domain.StockMovementRequest:
    properties:
      movement_type:
        $ref: '#/definitions/model.StockMovementType'
      note:
        type: string
      product_id:
        type: string
      quantity:
        type: number
      reference:
        type: string
    type: object
  domain.StockMovementResponse:
    properties:
      message:
        type: string
      stock:
        $ref: '#/definitions/model.Stock'
    type: object
  model.Product:
    properties:
      description:
        type: string
      name:
        type: string
      sku:
        type: string
      unit:
        type: string
    type: object
  model.ProductAPI:
    properties:
      description:
        type: string
      name:
        type: string
      sku:
        type: string
      unit:
        type: string
    type: object
  model.Stock:
    properties:
      product_id:
        type: string
      quantity:
        type: number
    type: object
  model.StockHistory:
    properties:
      movement_type:
        $ref: '#/definitions/model.StockMovementType'
      note:
        type: string
      product_id:
        type: string
      quantity_after:
        type: number
      quantity_delta:
        type: number
      reference:
        type: string
      stock_id:
        type: string
    type: object
  model.StockMovementType:
    enum:
    - IN
    - OUT
    - ADJUSTMENT
    type: string
    x-enum-varnames:
    - StockMovementIn
    - StockMovementOut
    - StockMovementAdjustment
host: localhost:8000
info:
  contact:
    email: team1@javan.co.id
    name: Team 1 Javan Inventory Barang
  description: Javan Inventory Barang API Documentation
  title: Javan Inventory Barang API
  version: 1.0.0
paths:
  /products:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Product'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all products
      tags:
      - products
    post:
      consumes:
      - application/json
      parameters:
      - description: Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ProductAPI'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create product
      tags:
      - products
  /products/{id}:
    delete:
      parameters:
      - description: Product ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete product
      tags:
      - products
    get:
      parameters:
      - description: Product ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get product by ID
      tags:
      - products
    put:
      consumes:
      - application/json
      parameters:
      - description: Product ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.ProductAPI'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update product
      tags:
      - products
  /stocks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Stock'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all current stock levels
      tags:
      - stocks
  /stocks/histories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.StockHistory'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all stock movement history
      tags:
      - stock-histories
  /stocks/histories/product/{product_id}:
    get:
      parameters:
      - description: Product ID
        format: uuid
        in: path
        name: product_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.StockHistory'
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List stock movement history for a product
      tags:
      - stock-histories
  /stocks/movement:
    post:
      consumes:
      - application/json
      parameters:
      - description: Movement payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.StockMovementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.StockMovementResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Record a stock IN or OUT movement
      tags:
      - stocks
  /stocks/product/{product_id}:
    get:
      parameters:
      - description: Product ID
        format: uuid
        in: path
        name: product_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Stock'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get current stock level for a product
      tags:
      - stocks
schemes:
- http
swagger: "2.0"
